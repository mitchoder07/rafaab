<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="rafaabGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="35%" stop-color="#F97316"/>
      <stop offset="70%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="rafaabGoldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="rafaabGoldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="50%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="rafaabGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <style>
      .rafaab-breathe {
        animation: rafaab-breathe 3s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes rafaab-breathe {
        0%, 100% { opacity: 0.82; }
        50% { opacity: 1; }
      }
      .rafaab-shimmer {
        animation: rafaab-shimmer 4s ease-in-out infinite;
      }
      @keyframes rafaab-shimmer {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Outer amulet ring (wax seal style) -->
  <g class="rafaab-breathe">
    <!-- Main disc -->
    <circle cx="40" cy="40" r="38" fill="url(#rafaabGold)"/>
    <!-- Inner glow -->
    <circle cx="40" cy="40" r="38" fill="url(#rafaabGlow)"/>
    <!-- Outer rim ring -->
    <circle cx="40" cy="40" r="37" fill="none" stroke="url(#rafaabGoldDark)" stroke-width="1.5"/>
    <!-- Decorative outer dots (Moroccan amulet style) -->
    <g fill="url(#rafaabGoldDark)" opacity="0.55">
      <circle cx="40" cy="4" r="1.2"/>
      <circle cx="58" cy="8.5" r="1"/>
      <circle cx="71.5" cy="22" r="1"/>
      <circle cx="76" cy="40" r="1.2"/>
      <circle cx="71.5" cy="58" r="1"/>
      <circle cx="58" cy="71.5" r="1"/>
      <circle cx="40" cy="76" r="1.2"/>
      <circle cx="22" cy="71.5" r="1"/>
      <circle cx="8.5" cy="58" r="1"/>
      <circle cx="4" cy="40" r="1.2"/>
      <circle cx="8.5" cy="22" r="1"/>
      <circle cx="22" cy="8.5" r="1"/>
    </g>
    <!-- Inner ring border -->
    <circle cx="40" cy="40" r="33" fill="none" stroke="url(#rafaabGoldDark)" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Interwoven Celtic knot letters (R-A-F-A-A-B woven together) -->
  <g class="rafaab-shimmer" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">

    <!-- R: outer left, curling inward at top and bottom (like a bracelet head) -->
    <path d="M22 22 C18 22 16 26 18 30 C20 33 24 32 26 30 C24 34 22 40 22 46 C22 52 24 56 28 58 C30 59 32 57 31 55"/>

    <!-- B: outer right, curling inward (mirror of R) -->
    <path d="M58 22 C62 22 64 26 62 30 C60 33 56 32 54 30 C56 34 58 40 58 46 C58 52 56 56 52 58 C50 59 48 57 49 55"/>

    <!-- F: horizontal locking bar across the middle -->
    <path d="M40 18 L40 62"/>
    <path d="M28 36 L52 36"/>
    <path d="M28 36 L28 40 M52 36 L52 40"/>

    <!-- A1 (left of center) -->
    <path d="M34 30 L36 50 M30 42 L40 42"/>
    <!-- A2 (center, on the F bar) -->
    <path d="M40 30 L40 50 M36 42 L44 42"/>
    <!-- A3 (right of center) -->
    <path d="M46 30 L44 50 M40 42 L50 42"/>

    <!-- Weaving connectors (Celtic continuous loop) -->
    <path d="M18 30 C24 28 30 28 34 30" opacity="0.7"/>
    <path d="M62 30 C56 28 50 28 46 30" opacity="0.7"/>
    <path d="M28 58 C34 60 46 60 52 58" opacity="0.7"/>
  </g>

  <!-- Shopping trolley in the center (over the F bar) -->
  <g class="rafaab-breathe" fill="#FFFFFF" opacity="0.98">
    <!-- Trolley basket -->
    <path d="M35 45 L45 45 L43.5 52 L36.5 52 Z" fill="none" stroke="#FFFFFF" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- Trolley handle -->
    <path d="M33 44 L34.5 44 L36 51" fill="none" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Trolley wheels -->
    <circle cx="37" cy="54.5" r="1.1" fill="#FFFFFF"/>
    <circle cx="43" cy="54.5" r="1.1" fill="#FFFFFF"/>
    <!-- Sparkle in trolley -->
    <circle cx="40" cy="48.5" r="0.8" fill="url(#rafaabGoldLight)"/>
  </g>

  <!-- Top and bottom flourishes (Moroccan amulet style) -->
  <g class="rafaab-shimmer" fill="url(#rafaabGoldDark)" opacity="0.6">
    <path d="M40 9 L42 13 L40 11 L38 13 Z"/>
    <path d="M40 71 L42 67 L40 69 L38 67 Z"/>
  </g>
</svg>
